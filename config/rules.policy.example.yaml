policy_version: v1.0.0
thresholds:
  confidence_auto_apply_threshold: 0.70
  max_auto_adjustment_pct: 20
  heavy_rain_last_24h_mm: 10
  high_rain_forecast_next_24h_mm: 8
  high_rain_probability_pct: 60
actions:
  allowed:
    - keep
    - reduce
    - skip
    - increase
hard_rules:
  - id: maintenance_blackout
    effect: force_skip
  - id: clamp_runtime_bounds
    effect: clamp_to_device_limits
  - id: clamp_auto_adjustment
    effect: clamp_to_max_auto_adjustment_pct
  - id: stale_weather_fallback
    effect: baseline_keep
  - id: policy_mismatch_manual_review
    effect: manual_review
versioning:
  prompt_version_format: prompt.v<major>.<minor>.<patch>
  policy_version_format: v<major>.<minor>.<patch>
